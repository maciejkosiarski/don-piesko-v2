- name: "Anna Juszczak-Kosiarska"
  role: "Założycielka & Groomer"
  bio: "Psy towarzyszyły mi, odkąd pamiętam – dom rodzinny pełen czworonogów ukształtował moją wrażliwość i nauczył mnie ich języka. Jednak moja prawdziwa droga zaczęła się od wyjątkowego prezentu na osiemnaste urodziny. To wtedy w moim życiu pojawił się cocker spaniel, który nie tylko stał się moim najbliższym przyjacielem, ale też rozbudził fascynację profesjonalną pielęgnacją tej wymagającej rasy. Zanim jednak otworzyłam drzwi własnego salonu, szukałam swojego miejsca w zawodach, które nie dawały mi żadnej satysfakcji. Pewnego dnia, siedząc w pracy, która była jedynie obowiązkiem, zrozumiałam, że czas wrócić do korzeni. Postanowiłam postawić wszystko na jedną kartę i pójść za głosem pasji. W 2020 roku ukończyłam profesjonalny kurs w Centrum Groomingu, a dwa lata później – bogatsza o setki godzin praktyki – otworzyłam DonPiesko w moim rodzinnym Lublinie. Dziś w salonie często towarzyszy mi Luśka, moja adoptowana kundelka, która pełni rolę gospodyni i dba o dobre nastroje naszych gości. W mojej pracy największą radość sprawia mi dopracowywanie detali – uwielbiam rzeźbić psie pyszczki, nadając im wyrazistości i uroku, który zachwyca właścicieli przy odbiorze. W DonPiesko nie tylko strzygę. Tworzę miejsce, gdzie każdy pies jest traktowany z szacunkiem, na jaki zasługuje członek rodziny. Zapraszam Cię do mojego świata – zadbam o Twojego pupila tak, jak dba się o najbliższych."
  image: ""
  initials: "AJK"
