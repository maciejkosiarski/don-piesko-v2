- question: "Jak przygotować psa do wizyty w salonie?"
  answer: |
    Przed wizytą warto zadbać o kilka rzeczy:

    Spacer przed wizytą – pomoże psu się odprężyć i załatwić potrzeby fizjologiczne.
    Wyczesanie psa (jeśli to możliwe) – pomoże uniknąć nieprzyjemnego wyrywania kołtunów.
    Nie karm psa tuż przed wizytą – niektóre psy mogą być zestresowane, co może powodować nudności.
    Przyzwyczajanie do dotyku – jeśli Twój pies nie lubi być dotykany przy łapach czy uszach, warto ćwiczyć to w domu.

- question: "Jak często powinno się strzyc psa?"
  answer: |
    Częstotliwość strzyżenia zależy od rasy i rodzaju sierści:

    Cocker spaniel, shih tzu, maltańczyk – co 6-8 tygodni.
    Psy z dłuższą sierścią (golden retriever, border collie) – co 2-3 miesiące, aby uniknąć kołtunów.
    Krótka sierść (labrador, beagle) – nie wymaga strzyżenia, ale warto regularnie kąpać i pielęgnować sierść.

- question: "Jakie kosmetyki są używane w salonie?"
  answer: |
    Używamy profesjonalnych, hipoalergicznych kosmetyków dostosowanych do różnych rodzajów sierści i skóry. Mamy specjalne szampony dla psów z alergiami, a także odżywki, które ułatwiają rozczesywanie. Jeśli Twój pies ma wrażliwą skórę, poinformuj nas o tym – dobierzemy odpowiedni produkt.

- question: "Czy mogę zostać z psem podczas wizyty?"
  answer: |
    Wiemy, że dla niektórych właścicieli to ważne, jednak doświadczenie pokazuje, że większość psów jest spokojniejsza, gdy właściciela nie ma w pobliżu. Jeśli jednak Twój pies jest wyjątkowo lękliwy, możemy omówić taką możliwość.

- question: "Co jeśli mój pies jest agresywny lub bojaźliwy?"
  answer: |
    Każdy pies jest inny, dlatego staramy się podchodzić do nich indywidualnie. Jeśli Twój pupil ma trudności z kontaktami z ludźmi, warto uprzedzić nas o tym przed wizytą. Nie stosujemy żadnych środków uspokajających – pracujemy metodami pozytywnego wzmocnienia i cierpliwości.

- question: "Jak długo trwa wizyta w salonie?"
  answer: |
    Czas pielęgnacji zależy od rasy i zakresu usług.

- question: "Jak wygląda pierwsza wizyta szczeniaka?"
  answer: |
    Pierwsza wizyta to zwykle zapoznanie z salonem i oswojenie psa z dźwiękami oraz dotykiem. Na pierwszym miejscu jest komfort psigo dziecka i samopoczucie. Dlatego trochę się bawimy, trochę pielęgnujemy. Nic na siłe, robimy tyle, na ile pozwoli nam pies. Zalecamy pierwszą wizytę po odbytych wszystkich szczepieniach.

- question: "Co zrobić, jeśli mój pies ma bardzo skołtunioną sierść?"
  answer: |
    Jeśli sierść jest mocno splątana, delikatne rozczesywanie może nie wystarczyć i konieczne będzie przycięcie kołtunów. Warto pamiętać, że lepiej zapobiegać – regularne czesanie (nawet co 2-3 dni) pomaga uniknąć problemu.

- question: "Czy oferujecie strzyżenie pod konkretne wzorce rasowe?"
  answer: |
    Tak, znamy standardy strzyżenia wielu ras, np. cocker spaniela, pudla, yorka czy shih tzu. Możemy również dostosować fryzurę do Twoich preferencji – wystarczy, że pokażesz zdjęcie lub opowiesz, czego oczekujesz.
